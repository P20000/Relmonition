name: Deploy Application
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'terraform/**'
      - 'README.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update Kubeconfig
        run: |
          # Ensure the aws cli is authenticated in the current shell session
          aws sts get-caller-identity
          aws eks update-kubeconfig --name relmonition-cluster --region ap-south-1

      - name: Deploy App
        env:
          KUBECONFIG: /home/runner/.kube/config
          TURSO_CONNECTION_URL: ${{ secrets.TURSO_CONNECTION_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Test auth again before deploy
          kubectl get svc
          
          chmod +x ./deploy.sh
          ./deploy.sh