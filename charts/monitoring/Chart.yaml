apiVersion: v2
name: relmonition-monitoring
description: >
  Cluster-level observability stack for Relmonition.
  Wraps kube-prometheus-stack with a pre-built Relmonition Grafana dashboard
  and custom PrometheusRule alerting rules.
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: kube-prometheus-stack
    version: "61.9.0"
    repository: https://prometheus-community.github.io/helm-charts
