coupleId: "default"
image:
  repository: relmonition-server
  tag: latest
replicaCount: 2
resources:
  limits:
    memory: 512Mi
    cpu: 500m
turso:
  connectionUrl: ""
  authToken: ""

probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
