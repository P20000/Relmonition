apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-server
  namespace: couple-{{ .Values.coupleId }}
spec:
  type: ClusterIP
  selector:
    app: relmonition
    tenant: {{ .Values.coupleId | quote }}
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3001
    - name: debug
      protocol: TCP
      port: 3001
      targetPort: 3001
