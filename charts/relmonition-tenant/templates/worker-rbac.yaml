{{- if .Values.worker.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-worker-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-worker-cr
rules:
  # The worker needs to manage any resources deployed by Helm (namespaces, deployments, ingress, etc.)
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-worker-crb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-worker-cr
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-worker-sa
    namespace: {{ .Release.Namespace }}
{{- end }}
