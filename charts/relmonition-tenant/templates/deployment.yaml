apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-server
  namespace: couple-{{ .Values.coupleId }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: relmonition
      tenant: {{ .Values.coupleId | quote }}
  template:
    metadata:
      labels:
        app: relmonition
        tenant: {{ .Values.coupleId | quote }}
    spec:
      containers:
      - name: server
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        ports:
        - containerPort: 3001
        env:
          - name: TURSO_CONNECTION_URL
            value: {{ .Values.turso.connectionUrl | quote }}
          - name: TURSO_AUTH_TOKEN
            value: {{ .Values.turso.authToken | quote }}
