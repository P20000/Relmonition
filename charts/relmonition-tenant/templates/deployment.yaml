apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-server
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: relmonition
      tenant: {{ .Values.coupleId | quote }}
  template:
    metadata:
      labels:
        app: relmonition
        tenant: {{ .Values.coupleId | quote }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
        prometheus.io/path: "/metrics"
        rollout-trigger: {{ now | date "20060102150405" | quote }}
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "2"
          - name: single-request-reopen
      containers:
      - name: server
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3001
        - name: metrics
          containerPort: 9464
        livenessProbe:
          httpGet:
            path: {{ .Values.probes.liveness.path }}
            port: 3001
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.probes.readiness.path }}
            port: 3001
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        env:
          - name: TURSO_CONNECTION_URL
            value: {{ .Values.turso.connectionUrl | quote }}
          - name: TURSO_AUTH_TOKEN
            value: {{ .Values.turso.authToken | quote }}
          - name: GEMINI_API_KEY
            value: {{ .Values.geminiApiKey | quote }}
          - name: JWT_SECRET
            value: {{ .Values.jwtSecret | quote }}
          - name: ENCRYPTION_KEY
            value: {{ .Values.encryptionKey | quote }}
          - name: NODE_ENV
            value: {{ .Values.nodeEnv | quote }}
          - name: COOKIE_DOMAIN
            value: "api.{{ .Values.ingress.domain }}"

