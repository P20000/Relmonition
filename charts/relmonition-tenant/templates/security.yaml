# 1. Network Policy (Strict Tenant Isolation)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-isolation
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {} # Select all pods in this tenant namespace
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }} # Only allow same-namespace traffic
    - namespaceSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx # Allow traffic from the ingress controller
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
  - ports: # Allow egress to DNS (CoreDNS)
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to: # Allow egress to shared services or external APIs (e.g., Turso, Gemini)
    - ipBlock:
        cidr: 0.0.0.0/0
---
# 2. Resource Quota (Scaling & Budget Protection)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: {{ .Release.Name }}-quota
  namespace: {{ .Release.Namespace }}
spec:
  hard:
    requests.cpu: "2" # Supports up to 4 replicas of 500m
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
