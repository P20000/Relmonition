apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: relmonition-ingress
  namespace: couple-001
spec:
  ingressClassName: nginx
  rules:
  - host: api.relmonition.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: couple-001-server
            port:
              number: 3001