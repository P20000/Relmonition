apiVersion: v1
kind: Namespace
metadata:
  name: couple-${COUPLE_ID}
  labels:
    tenant-id: "${COUPLE_ID}"
    compliance-tier: "hipaa-gdpr"
    encryption-required: "true"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: couple-quota
  namespace: couple-${COUPLE_ID}
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 4Gi
